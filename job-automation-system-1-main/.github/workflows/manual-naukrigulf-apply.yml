name: Manual — NaukriGulf Apply

on:
  workflow_dispatch:
    inputs:
      max_applies:
        description: 'Maximum applications per run'
        required: false
        default: '1'
      dry_run:
        description: 'Dry run (log only, do not submit)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  naukrigulf-apply:
    name: NaukriGulf Apply
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Verify NaukriGulf session
        id: session_check
        run: |
          python -c "
          from pathlib import Path
          import sys
          profile = Path('data/ng_profile')
          if not profile.exists() or not any(profile.iterdir()):
              print('SESSION_MISSING')
              sys.exit(1)
          print('SESSION_OK')
          "

      - name: Run NaukriGulf apply
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCLUDE_KEYWORDS:    ${{ secrets.EXCLUDE_KEYWORDS }}
          NG_ENABLED:          "true"
          NG_DRY_RUN:          ${{ github.event.inputs.dry_run }}
          NG_MAX_PER_RUN:      ${{ github.event.inputs.max_applies }}
          NG_DAILY_LIMIT:      "2"
          NG_SCORE_THRESHOLD:  "85"
          NG_COOLDOWN_SECONDS: "180"
          NG_SLOW_MO:          "800"
          NG_PROFILE_DIR:      "data/ng_profile"
          CV_PATH:             "data/cv.pdf"
          NG_EXCLUDE_KEYWORDS: ${{ secrets.NG_EXCLUDE_KEYWORDS }}
        run: |
          python -c "
          import logging, json
          logging.basicConfig(
              level=logging.INFO,
              format='%(asctime)s %(levelname)s %(name)s %(message)s'
          )
          from src.naukrigulf_apply import run_naukrigulf_apply
          max_applies = int('${{ github.event.inputs.max_applies }}' or '1')
          results = run_naukrigulf_apply(jobs=None, max_applies=max_applies)
          summary = {
              'total':   len(results),
              'success': sum(1 for r in results if r.status.value == 'success'),
              'dry_run': sum(1 for r in results if r.status.value == 'dry_run'),
              'failed':  sum(1 for r in results if r.status.value == 'failed'),
          }
          print('APPLY_SUMMARY:', json.dumps(summary))
          for r in results:
              print(r.status.value, '|', r.title[:60], '|', r.company[:30])
          "

      - name: Notify result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token   = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.getenv('TELEGRAM_CHAT_ID', '')
          outcome = '${{ steps.session_check.outcome }}'
          job_outcome = '${{ job.status }}'
          if not (token and chat_id):
              exit(0)
          if outcome != 'success':
              text = '⚠️ NaukriGulf apply skipped — no session on self-hosted runner. Log in and re-run.'
          elif job_outcome == 'success':
              text = '✅ NaukriGulf apply run complete. Check logs for results.'
          else:
              text = '🔴 NaukriGulf apply run failed. Check GitHub Actions logs.'
          requests.post(
              f'https://api.telegram.org/bot{token}/sendMessage',
              json={'chat_id': chat_id, 'text': text},
              timeout=10,
          )
          "
