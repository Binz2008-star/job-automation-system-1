name: Daily Job Bot

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Gmail OAuth files
        run: |
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          printf '%s' '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Run daily pipeline
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m src.run_daily

      - name: Run follow-up reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.follow_up

      - name: Deploy dashboard to GitHub Pages
        run: |
          if [ ! -f dashboard.html ]; then
            echo "dashboard.html not found; skipping dashboard deploy"
            exit 0
          fi
          mkdir -p docs
          cp dashboard.html docs/index.html
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update dashboard [skip ci]"
          git push
