name: Daily Job Bot

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Write Gmail OAuth files
        run: |
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          printf '%s' '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Debug NG env
        run: |
          echo "NG_ENABLED=${NG_ENABLED:-missing}"
          echo "NG_DRY_RUN=${NG_DRY_RUN:-missing}"
          echo "NG_MAX_PER_RUN=${NG_MAX_PER_RUN:-missing}"
          echo "NG_DAILY_LIMIT=${NG_DAILY_LIMIT:-missing}"
          echo "NG_SCORE_THRESHOLD=${NG_SCORE_THRESHOLD:-missing}"
        env:
          NG_ENABLED: ${{ secrets.NG_ENABLED }}
          NG_DRY_RUN: ${{ secrets.NG_DRY_RUN }}
          NG_MAX_PER_RUN: ${{ secrets.NG_MAX_PER_RUN }}
          NG_DAILY_LIMIT: ${{ secrets.NG_DAILY_LIMIT }}
          NG_SCORE_THRESHOLD: ${{ secrets.NG_SCORE_THRESHOLD }}

      - name: Run daily pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NG_ENABLED: ${{ secrets.NG_ENABLED }}
          NG_DRY_RUN: ${{ secrets.NG_DRY_RUN }}
          NG_MAX_PER_RUN: ${{ secrets.NG_MAX_PER_RUN }}
          NG_DAILY_LIMIT: ${{ secrets.NG_DAILY_LIMIT }}
          NG_SCORE_THRESHOLD: ${{ secrets.NG_SCORE_THRESHOLD }}
          NAUKRIGULF_EMAIL: ${{ secrets.NAUKRIGULF_EMAIL }}
          NAUKRIGULF_PASSWORD: ${{ secrets.NAUKRIGULF_PASSWORD }}
        run: python -m src.run_daily

      - name: Run follow-up reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.follow_up

      - name: Deploy dashboard to GitHub Pages
        run: |
          if [ ! -f dashboard.html ]; then
            echo "dashboard.html not found; skipping dashboard deploy"
            exit 0
          fi
          mkdir -p docs
          cp dashboard.html docs/index.html
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update dashboard [skip ci]"
          git push
