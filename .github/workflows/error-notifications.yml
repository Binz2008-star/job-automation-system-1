name: Error Notifications

on:
  workflow_run:
    workflows: ["Daily Job Bot Full", "Daily Job Bot Legacy", "Deploy to Production", "QA Tests"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 🚨 Create PagerDuty Incident on Failure
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: Entle/action-pagerduty-alert@1.0.5
        with:
          pagerduty-integration-key: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          summary: "${{ github.event.workflow_run.name }} failed in ${{ github.repository }}"
          severity: "critical"
          source: "GitHub Actions"
          dedup-key: "github-workflow-${{ github.event.workflow_run.name }}-${{ github.repository }}"
          details: |
            Workflow: ${{ github.event.workflow_run.name }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Commit: ${{ github.event.workflow_run.head_sha }}
            Run URL: ${{ github.event.workflow_run.html_url }}
            Runbook: https://github.com/Binz2008-star/job-automation-system-1/wiki/Runbook

      - name: ✅ Resolve PagerDuty Incident on Success
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: Entle/action-pagerduty-alert@1.0.5
        with:
          pagerduty-integration-key: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          resolve: true
          dedup-key: "github-workflow-${{ github.event.workflow_run.name }}-${{ github.repository }}"

      - name: Send Telegram Alert
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚨 **Workflow Failed!**
            
            **Workflow:** ${{ github.event.workflow_run.name }}
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Run ID:** [View Logs](${{ github.event.workflow_run.html_url }})
            **Commit:** ${{ github.event.workflow_run.head_sha }}

      - name: Send Discord Alert
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: appleboy/discord-action@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          message: |
            🚨 **Workflow Failed!**

            **Workflow:** ${{ github.event.workflow_run.name }}
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Run:** [View Logs](${{ github.event.workflow_run.html_url }})
            **Commit:** ${{ github.event.workflow_run.head_sha }}
          username: "Rico AI Bot"
          color: "0xFF0000"
